name: ble_proximity_signal_example
description: Demonstrates how to use the ble_proximity_signal plugin.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  ble_proximity_signal:
    # When depending on this package from a real application you should use:
    #   ble_proximity_signal: ^x.y.z
    # See https://dart.dev/tools/pub/dependencies#version-constraints
    # The example app is bundled with the plugin so we use a path dependency on
    # the parent directory to use the current plugin's version.
    path: ../
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  patrol: ^4.5.0
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

patrol:
  app_name: Ble Proximity Signal Example
  test_directory: integration_test # Use custom directory
  android:
    package_name: com.andrew.signal.example
  ios:
    bundle_id: com.andrew.signal.bleProximitySignalExample
