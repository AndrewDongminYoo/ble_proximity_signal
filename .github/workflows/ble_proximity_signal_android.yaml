name: ble_proximity_signal_android

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - .github/workflows/ble_proximity_signal_android.yaml
      - ble_proximity_signal_android/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/ble_proximity_signal_android.yaml
      - ble_proximity_signal_android/**

jobs:
  build:
    if: ${{ !contains(fromJSON('["dependabot[bot]", "renovate[bot]", "snyk-bot", "allcontributors[bot]"]'), github.actor) }}
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      flutter_version: 3.35.0
      format_line_length: 120
      working_directory: ble_proximity_signal_android
